# CI workflow for zomboid-cli
# Phase 6 Task 6.5 — GitHub Actions CI gate
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Default test suite — runs on all supported OSes
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Run test suite
        run: bun test

  # E2E subprocess tests — runs on Ubuntu only
  # E2E tests spawn the CLI as a subprocess and validate startup, exit, and error behaviors.
  # These tests require a proper TTY environment and are not run on Windows/macOS due to
  # differences in signal handling (SIGINT/Ctrl+C) on those platforms.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: bun install

      - name: Run E2E smoke tests
        run: bun test --filter e2e
